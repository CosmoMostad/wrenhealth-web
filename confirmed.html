<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Confirmed — Wren Health</title>
  <meta name="description" content="Your Wren Health account has been confirmed." />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%232D6A4F'/><path d='M16 6C11 6 7 11 7 16c0 3.5 1.8 6.5 4.5 8.2 1.2.7 2.5 1 3.5 1s2.3-.3 3.5-1C21.2 22.5 23 19.5 23 16c0-5-4-10-7-10z' fill='white' opacity='.9'/></svg>" />
  <style>
    .confirm-page {
      min-height: calc(100vh - 64px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      background: var(--bg);
    }

    .confirm-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 56px 48px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0,0,0,0.07);
    }

    .confirm-icon {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: var(--green-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
    }

    .confirm-icon svg {
      width: 36px;
      height: 36px;
    }

    .confirm-card h1 {
      font-size: 26px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.4px;
      margin-bottom: 12px;
    }

    .confirm-card p {
      font-size: 16px;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 36px;
    }

    .confirm-card p strong {
      color: var(--text);
      font-weight: 600;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--green);
      color: white;
      font-size: 16px;
      font-weight: 600;
      padding: 14px 32px;
      border-radius: 12px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: background 0.15s ease, transform 0.1s ease;
    }

    .btn-primary:hover {
      background: var(--green-light);
      transform: translateY(-1px);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .divider {
      width: 48px;
      height: 2px;
      background: var(--green-muted);
      margin: 32px auto;
      border-radius: 2px;
    }

    .confirm-hint {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 0;
    }

    @media (max-width: 520px) {
      .confirm-card {
        padding: 40px 28px;
      }
    }
  </style>
</head>
<body>

<!-- Nav -->
<nav>
  <div class="nav-inner">
    <a class="nav-logo" href="/">
      <div class="nav-logo-dot">
        <svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg" fill="white">
          <path d="M6 15 Q3 11 5 7 Q5.5 10.5 7.5 12.5Z"/>
          <ellipse cx="11.5" cy="14" rx="5.5" ry="3.8"/>
          <circle cx="15.5" cy="10" r="3.2"/>
          <polygon points="18.2,9.2 20,10 18.2,10.8"/>
        </svg>
      </div>
      Wren Health
    </a>
  </div>
</nav>

<!-- Confirmation -->
<section class="confirm-page">
  <div class="confirm-card">

    <!-- Checkmark icon -->
    <div class="confirm-icon">
      <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="18" cy="18" r="17" stroke="#2D6A4F" stroke-width="2"/>
        <path d="M11 18.5L15.5 23L25 13" stroke="#2D6A4F" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <h1>Email confirmed</h1>
    <p>
      Your Wren Health account is active.<br />
      <strong>Open the app and sign in</strong> to get started.
    </p>

    <a class="btn-primary" href="wrenhealth://">
      <!-- Phone icon -->
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="5" y="2" width="14" height="20" rx="2" ry="2"/>
        <line x1="12" y1="18" x2="12.01" y2="18"/>
      </svg>
      Open Wren Health
    </a>

    <div class="divider"></div>

    <p class="confirm-hint">
      On a computer? Open Wren Health on your iPhone and sign in with your email and password.
    </p>

  </div>
</section>

</body>
</html>
